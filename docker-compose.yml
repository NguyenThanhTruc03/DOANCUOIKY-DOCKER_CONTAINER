version: "3.8"

services:
  web:
    build: .
    container_name: web_app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    networks:
      - net_truyentranh
    # Sửa đúng cho image php:*-apache
    command: >
      sh -c "
        echo 'LimitRequestLine 65536' >> /etc/apache2/apache2.conf &&
        echo 'LimitRequestFieldSize 65536' >> /etc/apache2/apache2.conf &&
        echo 'LimitRequestFields 300' >> /etc/apache2/apache2.conf &&
        apache2-foreground
      "

  db:
    image: mysql:8.0
    container_name: db
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: truyentranh
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - net_truyentranh

networks:
  net_truyentranh:
    driver: bridge

volumes:
  db_data: